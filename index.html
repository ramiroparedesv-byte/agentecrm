<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgenteCRM — CRM inteligente para vendedores</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9b9b96;
      --blue-bg: #E6F1FB;
      --blue-text: #0C447C;
      --blue-border: #85B7EB;
      --green-bg: #EAF3DE;
      --green-text: #27500A;
      --amber-bg: #FAEEDA;
      --amber-text: #854F0B;
      --red-bg: #FCEBEB;
      --red-text: #A32D2D;
      --radius: 10px;
      --radius-sm: 6px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAVBAR */
    .navbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 0.5px solid var(--border); }
    .logo { font-size: 16px; font-weight: 500; } .logo span { color: #378ADD; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .btn-outline { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; }
    .btn-outline:hover { background: var(--bg); }
    .btn-primary { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: none; background: #378ADD; color: white; cursor: pointer; }
    .btn-primary:hover { background: #185FA5; }

    /* LAYOUT */
    .app { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 53px); }
    .sidebar { border-right: 0.5px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
    .sidebar-head { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .btn-add { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; }
    .btn-add:hover { background: var(--bg); }
    .contact-list { flex: 1; overflow-y: auto; }
    .contact-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-bottom: 0.5px solid var(--border); }
    .contact-row:hover { background: var(--bg); }
    .contact-row.active { background: var(--blue-bg); }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 13px; font-weight: 500; }
    .contact-sub { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .badge-hot { background: var(--red-bg); color: var(--red-text); }
    .badge-warm { background: var(--amber-bg); color: var(--amber-text); }
    .badge-cold { background: var(--blue-bg); color: var(--blue-text); }

    /* STATS BAR */
    .stats-bar { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); background: var(--surface); }
    .stat { flex: 1; padding: 12px 20px; border-right: 0.5px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 22px; font-weight: 500; }
    .stat-lbl { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* DETAIL */
    .detail { display: flex; flex-direction: column; overflow: hidden; }
    .detail-head { padding: 14px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); }
    .detail-name { font-size: 15px; font-weight: 500; }
    .detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-tertiary); font-size: 14px; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .tab { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text-tertiary); cursor: pointer; }
    .tab.active { background: var(--bg); color: var(--text); border-color: var(--border-strong); }

    /* CHAT */
    .chat-wrap { background: var(--bg); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
    .msg { margin-bottom: 8px; }
    .msg-name { font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }
    .bubble { display: inline-block; padding: 7px 11px; border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 85%; }
    .msg-in .bubble { background: var(--surface); border: 0.5px solid var(--border); color: var(--text); }
    .msg-out { text-align: right; }
    .msg-out .bubble { background: var(--green-bg); color: var(--green-text); }

    /* AI BLOCKS */
    .ai-block { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
    .ai-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .ai-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .ai-msg { background: var(--blue-bg); border: 0.5px solid var(--blue-border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
    .ai-msg .ai-label { color: #185FA5; }
    .ai-msg .ai-text { color: var(--blue-text); }
    .objecion { font-size: 13px; padding: 4px 0; border-bottom: 0.5px solid var(--border); color: var(--text); }
    .objecion:last-child { border-bottom: none; }

    /* BUTTONS */
    .btn-full { width: 100%; padding: 10px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; margin-top: 8px; }
    .btn-full:hover { background: var(--bg); }
    .btn-copy { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--blue-border); background: transparent; color: var(--blue-text); cursor: pointer; margin-top: 6px; }
    .btn-copy:hover { background: var(--blue-bg); }
    .btn-copy.copied { background: var(--green-bg); color: var(--green-text); border-color: transparent; }

    /* NEW CONV */
    textarea { width: 100%; min-height: 120px; font-size: 13px; padding: 10px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); resize: vertical; font-family: inherit; line-height: 1.6; }
    textarea:focus { outline: none; border-color: #378ADD; }

    /* LOADING */
    .loading { display: flex; gap: 5px; align-items: center; padding: 12px 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.2;}40%{opacity:1;} }

    .thinking-text { font-size: 12px; color: var(--text-tertiary); margin-left: 4px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 420px; max-width: 90vw; }
    .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
    .modal input { width: 100%; padding: 9px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); font-size: 13px; font-family: mono; margin-bottom: 12px; background: var(--bg); color: var(--text); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Agente<span>CRM</span></div>
  <div class="nav-right">
    <button class="btn-outline" onclick="showApiModal()">⚙ API Key</button>
    <button class="btn-primary" onclick="addNew()">+ Nuevo prospecto</button>
  </div>
</nav>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">prospectos</div></div>
  <div class="stat"><div class="stat-val" style="color:#A32D2D;" id="sHot">0</div><div class="stat-lbl">listos para cerrar</div></div>
  <div class="stat"><div class="stat-val" style="color:#854F0B;" id="sWarm">0</div><div class="stat-lbl">en proceso</div></div>
  <div class="stat"><div class="stat-val" style="color:#185FA5;" id="sCold">0</div><div class="stat-lbl">fríos</div></div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Pipeline</span>
      <button class="btn-add" onclick="addNew()">+ Nuevo</button>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>
  <div class="detail" id="detail">
    <div class="empty-state">Selecciona un prospecto o agrega uno nuevo</div>
  </div>
</div>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiModal" style="display:none;">
  <div class="modal">
    <h3>Configura tu API Key de Anthropic</h3>
    <p>Necesitas una API key para que Claude analice las conversaciones. Obtén la tuya en <a href="https://console.anthropic.com" target="_blank" style="color:#378ADD;">console.anthropic.com</a></p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <div class="modal-btns">
      <button class="btn-outline" onclick="closeApiModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveApiKey()">Guardar</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#E6F1FB:#0C447C', '#EAF3DE:#27500A', '#FAEEDA:#854F0B', '#FCEBEB:#A32D2D', '#F3EDFF:#4A2D99'];
let contacts = JSON.parse(localStorage.getItem('agentecrm_contacts') || '[]');
let selected = null;

if (contacts.length === 0) {
  contacts = [
    { id:1, name:'Carlos M.', industry:'Inmobiliaria', initials:'CM', color:0, status:'warm',
      lastMsg:'Ok perfecto, las espero',
      conv:'Carlos M.: Hola, vi el depa en Polanco. ¿Sigue disponible?\nTú: Hola Carlos! Sí, son 18,000 al mes. ¿Te interesa verlo?\nCarlos M.: Está un poco caro... ¿tiene algo más económico?\nTú: Tengo uno en Anzures a 15,500. ¿Te mando fotos?\nCarlos M.: Sí. ¿Aceptan mascotas? Tengo un perro pequeño\nTú: El de Anzures sí acepta mascotas con depósito extra\nCarlos M.: Ok perfecto, las espero',
      analysis: null },
    { id:2, name:'Daniela R.', industry:'Marketing', initials:'DR', color:1, status:'hot',
      lastMsg:'Lo reviso hoy con mi socia',
      conv:'Daniela R.: Buenas, nos recomendaron para manejo de redes. ¿Qué manejan?\nTú: IG, Facebook y TikTok. Contenido + pauta. ¿Para qué giro?\nDaniela R.: Línea de ropa femenina. Queremos crecer ventas online\nTú: Perfecto. Paquete básico $8,500 MXN/mes. ¿Mando propuesta?\nDaniela R.: Sí mándala. ¿Tienen casos de éxito en moda?\nTú: Claro, te mando casos también. Dame tu correo\nDaniela R.: daniela@marcaxyz.com — lo reviso hoy con mi socia',
      analysis: null },
    { id:3, name:'Ana G.', industry:'Clínica dental', initials:'AG', color:2, status:'hot',
      lastMsg:'Las 10am estaría bien. ¿Cómo aparto?',
      conv:'Ana G.: Hola, quería preguntar por el precio de blanqueamiento\nRecepción: El blanqueamiento está en $2,800. Incluye evaluación sin costo\nAna G.: ¿Y en cuántas sesiones?\nRecepción: Una sola sesión de 90 minutos\nAna G.: ¿Tienen disponibilidad este sábado?\nRecepción: Tenemos 10am y 12pm\nAna G.: Las 10am estaría bien. ¿Cómo aparto?',
      analysis: null },
  ];
  saveContacts();
}

function saveContacts() {
  localStorage.setItem('agentecrm_contacts', JSON.stringify(contacts));
}

function getColors(i) {
  const pair = COLORS[i % COLORS.length].split(':');
  return { bg: pair[0], text: pair[1] };
}

function getStatusLabel(s) {
  return s === 'hot' ? 'Cerrar ya' : s === 'warm' ? 'En proceso' : 'Frío';
}

function updateStats() {
  document.getElementById('sTotal').textContent = contacts.length;
  document.getElementById('sHot').textContent = contacts.filter(c=>c.status==='hot').length;
  document.getElementById('sWarm').textContent = contacts.filter(c=>c.status==='warm').length;
  document.getElementById('sCold').textContent = contacts.filter(c=>c.status==='cold').length;
}

function renderList() {
  updateStats();
  document.getElementById('contactList').innerHTML = contacts.map(c => {
    const col = getColors(c.color);
    return `<div class="contact-row ${selected===c.id?'active':''}" onclick="selectContact(${c.id})">
      <div class="avatar" style="background:${col.bg};color:${col.text};">${c.initials}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-sub">${c.lastMsg}</div>
      </div>
      <span class="badge badge-${c.status}">${getStatusLabel(c.status)}</span>
    </div>`;
  }).join('');
}

function selectContact(id) {
  selected = id;
  renderList();
  const c = contacts.find(x=>x.id===id);
  showContactDetail(c);
}

function showContactDetail(c) {
  const col = getColors(c.color);
  document.getElementById('detail').innerHTML = `
    <div class="detail-head">
      <div class="avatar" style="background:${col.bg};color:${col.text};width:32px;height:32px;font-size:12px;">${c.initials}</div>
      <div class="detail-name">${c.name}</div>
      <span style="font-size:12px;color:${col.text};">${c.industry}</span>
      <span class="badge badge-${c.status}" style="margin-left:auto;">${getStatusLabel(c.status)}</span>
    </div>
    <div class="detail-body">
      <div class="tabs">
        <button class="tab active" id="tab-conv" onclick="showTab('conv',${c.id})">Conversación</button>
        <button class="tab" id="tab-ai" onclick="showTab('ai',${c.id})">Análisis IA</button>
      </div>
      <div id="tab-content"></div>
    </div>
  `;
  showTab('conv', c.id);
}

function showTab(tab, id) {
  const c = contacts.find(x=>x.id===id);
  document.getElementById('tab-conv').classList.toggle('active', tab==='conv');
  document.getElementById('tab-ai').classList.toggle('active', tab==='ai');
  const content = document.getElementById('tab-content');
  if (tab === 'conv') {
    const lines = c.conv.trim().split('\n');
    const msgs = lines.map(line => {
      const colon = line.indexOf(':');
      if (colon === -1) return '';
      const speaker = line.slice(0, colon).trim();
      const text = line.slice(colon + 1).trim();
      const isOut = speaker.toLowerCase() === 'tú' || speaker.toLowerCase() === 'tu' || speaker.toLowerCase() === 'recepción' || speaker.toLowerCase() === 'recepcion';
      return `<div class="msg msg-${isOut?'out':'in'}">
        <div class="msg-name">${speaker}</div>
        <div class="bubble">${text}</div>
      </div>`;
    }).join('');
    content.innerHTML = `
      <div class="chat-wrap">${msgs}</div>
      <button class="btn-full" onclick="analyzeContact(${id})">Analizar con Claude →</button>
    `;
  } else {
    if (!c.analysis) {
      content.innerHTML = `
        <div style="text-align:center;padding:2rem;color:var(--text-tertiary);font-size:13px;">
          Aún no hay análisis. Presiona el botón para analizarlo con Claude.
        </div>
        <button class="btn-full" onclick="analyzeContact(${id})">Analizar con Claude →</button>
      `;
    } else {
      renderAnalysis(c);
    }
  }
}

function renderAnalysis(c) {
  const a = c.analysis;
  const content = document.getElementById('tab-content');
  if (!content) return;
  const objs = a.objeciones && a.objeciones.length
    ? a.objeciones.map(o=>`<div class="objecion">${o}</div>`).join('')
    : '<div class="objecion" style="color:var(--text-tertiary);">Ninguna detectada</div>';
  content.innerHTML = `
    <div class="ai-block">
      <div class="ai-label">Situación</div>
      <div class="ai-text">${a.resumen}</div>
    </div>
    <div class="ai-block">
      <div class="ai-label">Intención del prospecto</div>
      <div class="ai-text">${a.intencion}</div>
    </div>
    <div class="ai-block">
      <div class="ai-label">Objeciones detectadas</div>
      ${objs}
    </div>
    <div class="ai-block">
      <div class="ai-label">Siguiente paso hoy</div>
      <div class="ai-text" style="font-weight:500;">${a.siguiente}</div>
    </div>
    <div class="ai-msg">
      <div class="ai-label">Mensaje listo para enviar</div>
      <div class="ai-text" id="msgText">${a.mensaje}</div>
      <button class="btn-copy" id="copyBtn" onclick="copyMessage('${escapeJs(a.mensaje)}')">Copiar mensaje</button>
    </div>
    <button class="btn-full" onclick="analyzeContact(${c.id})">Re-analizar →</button>
  `;
}

function escapeJs(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

function copyMessage(txt) {
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '¡Copiado!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='Copiar mensaje'; btn.classList.remove('copied'); },2000); }
  });
}

async function analyzeContact(id) {
  const apiKey = localStorage.getItem('agentecrm_apikey');
  if (!apiKey) { showApiModal(); return; }
  const c = contacts.find(x=>x.id===id);
  const content = document.getElementById('tab-content');
  if (content) content.innerHTML = `<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="thinking-text">Claude está analizando la conversación...</span></div>`;

  const prompt = `Eres el motor de análisis de AgenteCRM. Analiza esta conversación de ventas y responde SOLO en JSON válido, sin texto extra ni markdown:
{
  "status": "hot|warm|cold",
  "status_razon": "frase corta",
  "resumen": "1-2 oraciones sobre la situación",
  "intencion": "qué quiere realmente el prospecto",
  "objeciones": ["objeción 1", "objeción 2"],
  "siguiente": "acción concreta para HOY",
  "mensaje": "mensaje de WhatsApp listo para enviar"
}

Conversación:
${c.conv}`;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation: c.conv, apiKey })
    });
    const parsed = await res.json();
    if (!res.ok) throw new Error(parsed.error || 'Error del servidor');
    c.analysis = { ...parsed };
    c.status = parsed.status;
    saveContacts();
    renderList();
    document.getElementById('tab-conv').classList.remove('active');
    document.getElementById('tab-ai').classList.add('active');
    renderAnalysis(c);
  } catch(e) {
    if (content) content.innerHTML = `<div style="background:#FCEBEB;color:#A32D2D;padding:12px;border-radius:6px;font-size:13px;">Error: ${e.message}. Verifica tu API key.</div><button class="btn-full" onclick="showApiModal()">Configurar API Key</button>`;
  }
}

function addNew() {
  selected = null;
  renderList();
  document.getElementById('detail').innerHTML = `
    <div class="detail-head">
      <div class="detail-name">Nuevo prospecto</div>
    </div>
    <div class="detail-body">
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:var(--text-tertiary);display:block;margin-bottom:6px;">Nombre del prospecto</label>
        <input type="text" id="newName" placeholder="Ej: Carlos Mendoza" style="width:100%;padding:9px 12px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);" />
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:var(--text-tertiary);display:block;margin-bottom:6px;">Industria / giro</label>
        <input type="text" id="newIndustry" placeholder="Ej: Inmobiliaria, Clínica, Agencia..." style="width:100%;padding:9px 12px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);" />
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:var(--text-tertiary);display:block;margin-bottom:6px;">Pega la conversación de WhatsApp</label>
        <textarea id="newConv" placeholder="Carlos: Hola, vi tu producto en Instagram&#10;Tú: Hola Carlos! Gracias por escribir...&#10;Carlos: ¿Cuánto cuesta?"></textarea>
      </div>
      <button class="btn-full" onclick="saveNew()" style="background:#378ADD;color:white;border:none;">Guardar y analizar con Claude →</button>
    </div>
  `;
}

function saveNew() {
  const name = document.getElementById('newName').value.trim();
  const industry = document.getElementById('newIndustry').value.trim();
  const conv = document.getElementById('newConv').value.trim();
  if (!name || !conv) { alert('Ingresa el nombre y la conversación.'); return; }
  const initials = name.split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('');
  const id = Date.now();
  const c = { id, name, industry: industry || 'General', initials, color: contacts.length % COLORS.length, status: 'warm', lastMsg: conv.split('\n').pop().split(':').slice(1).join(':').trim() || conv.slice(-40), conv, analysis: null };
  contacts.unshift(c);
  saveContacts();
  selected = id;
  renderList();
  showContactDetail(c);
  analyzeContact(id);
}

function showApiModal() {
  const stored = localStorage.getItem('agentecrm_apikey') || '';
  document.getElementById('apiKeyInput').value = stored;
  document.getElementById('apiModal').style.display = 'flex';
  setTimeout(() => document.getElementById('apiKeyInput').focus(), 100);
}
function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const key = input.value.trim();
  if (!key || !key.startsWith('sk-')) { 
    input.style.borderColor = 'red';
    input.placeholder = 'La key debe empezar con sk-ant-...';
    return; 
  }
  try {
    localStorage.setItem('agentecrm_apikey', key);
    const saved = localStorage.getItem('agentecrm_apikey');
    if (saved === key) {
      closeApiModal();
      alert('✓ API Key guardada correctamente');
    } else {
      alert('Error al guardar. Intenta de nuevo.');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

renderList();
</script>
</body>
